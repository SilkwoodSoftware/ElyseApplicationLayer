<div class="dialog-backdrop">
  <div class="dialog-container" #dialogContainer
       (mousedown)="onMouseDown($event)"
       (mousemove)="onMouseMove($event)"
       (mouseup)="onMouseUp()">
    <h2>Manage User Roles</h2>
    <p class="notes"> </p>
    <div class="form-group">
      <p id="sidUsername">{{ data.username }}</p>
    </div>
    <div class="selection-table">
      <table>
        <thead>
          <tr>
            <th>Role</th>
            <th>Authorized</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let role of allRoles">
            <td>{{ role }}</td>
            <td>
              <div class="authorised-wrapper">
                <svg class="authorised-icon" [ngClass]="{'green-icon': isRoleAuthorised(role), 'red-icon': !isRoleAuthorised(role)}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                  <path *ngIf="isRoleAuthorised(role)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                  <path *ngIf="!isRoleAuthorised(role)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/>
                </svg>
                <span>{{ isRoleAuthorised(role) ? 'Yes' : 'No' }}</span>
              </div>
            </td>
            <td>
              <div class="action-wrapper">
                <svg class="action-icon" [ngClass]="{'delete-icon': isRoleAuthorised(role), 'add-icon': !isRoleAuthorised(role), 'selected': rolesToChange[role]}" (click)="onActionChange(role)" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                  <path *ngIf="isRoleAuthorised(role)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/>
                  <path *ngIf="!isRoleAuthorised(role)" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                </svg>
                <span>{{ isRoleAuthorised(role) ? 'Remove' : 'Authorize' }}</span>
              </div>
            </td>
           </tr>
        </tbody>
      </table>
    </div>
    <div class="message-text">
      <button class="confirmation-buttons" (click)="onSubmit()" [disabled]="isLoading">{{ isLoading ? 'Submitting...' : 'Submit' }}</button>
      <button class="confirmation-buttons" (click)="closeDialog()">Cancel</button>
    </div>
  </div>
</div>
