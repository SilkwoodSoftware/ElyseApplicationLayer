<div class="dialog-backdrop">
    <div class="dialog-container" #dialogContainer
         (mousedown)="onMouseDown($event)"
         (mousemove)="onMouseMove($event)"
         (mouseup)="onMouseUp()">
      <h2>Add Document Radio Button List</h2>
      <form [formGroup]="addDocRblistForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="mnemonic">
            <div class="label-wrapper">
              <span>Mnemonic:</span>              
            </div>
          </label>
          <input type="text" id="mnemonic" formControlName="mnemonic"
                 placeholder="e.g.: PUBSTAT">
        </div>
        <div class="form-group">
          <label for="attributeName"><span style="color: red;">*</span>List Name:</label>
          <input type="text" id="attributeName" formControlName="attributeName"
                 placeholder="e.g.: Publication Status">
        </div>
        <div class="form-group">
          <label for="description">Description:</label>
          <textarea id="description" formControlName="description"></textarea>
        </div>
        <div class="form-group">
          <label for="position">Position:</label>
          <input type="number" id="position" formControlName="position">
        </div>
        <div>
          <button class="confirmation-buttons" type="submit" [disabled]="!addDocRblistForm.valid">Submit</button>
          <button class="confirmation-buttons" type="button" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
