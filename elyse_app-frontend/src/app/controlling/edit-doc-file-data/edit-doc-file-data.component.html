<div class="container">
  <div *ngIf="documentId || fileId" class="form-container two-column-layout">
    <div class="column-left">
      <div class="table-heading">Edit data for {{ documentId ? '&nbsp;&nbsp;' + 'Document ID: ' + documentId + '&nbsp;&nbsp;&nbsp;' : '' }}{{ fileId ?
'File ID: ' + fileId : '' }}</div>

<div class="two-column-layout">
  <div class="column-left">
    <app-dynamic-form
    [fields]="leftColumnFields"
    [documentId]="documentId"
    [fileId]="fileId"
    (fieldAction)="onFieldAction($event)">
    </app-dynamic-form>
  </div>

  <div class="column-right">
    <app-dynamic-form
    [fields]="rightColumnFields"
    [documentId]="documentId"
    [fileId]="fileId"
    (fieldAction)="onFieldAction($event)">
    </app-dynamic-form>
  </div>
</div>
<div class="form-actions">
  <button [disabled]="!hasChanges()" (click)="onSaveChanges()">Save Changes</button>
</div>
</div>

<div class="messages-container">
  <span *ngFor="let item of messageItems" class="result-item" [ngClass]="{'error': item.label ===
  'Transaction Status' && item.value !== 'Good'}">
      {{ item.label }}: <span class="result-value">{{ item.value }}</span>
    </span>
</div>
</div>
