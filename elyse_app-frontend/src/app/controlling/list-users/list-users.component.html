<div>
  <div class="table-heading">All Users <br><br></div>
</div>
<div class="table-container" #tableContainer>
  <table>
    <thead>
      <tr>
        <th *ngFor="let column of visibleColumns">
          <div class="column-heading">
            <span class="column-title" (click)="onColumnSelect(column)">{{ column }}</span>
            <span class="sort-icon" *ngIf="sortColumn === column">{{sortOrder === 'asc' ? '▲' : '▼'}}</span>
          </div>
          <img class="resize-handle" src="assets/icons/column-resize.svg" alt="Resize Icon" appColumnResize>
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of sidList; let i = index"
          [class.selected]="selectedRows.includes(user)"
          (click)="onRowMultiSelect($event, user)">
        <td *ngFor="let column of visibleColumns">{{ user[column] }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="messages-container">
  <span *ngFor="let item of messageItems" class="result-item">
    {{ item.label }}: <span class="result-value">{{ item.value }}</span>
  </span>
</div>
