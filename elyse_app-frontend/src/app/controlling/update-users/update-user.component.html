<div class="dialog-backdrop">
  <div class="dialog-container" #dialogContainer
       (mousedown)="onMouseDown($event)"
       (mousemove)="onMouseMove($event)"
       (mouseup)="onMouseUp()">
    <h2>Update User</h2>
    <form [formGroup]="updateUserForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <p id="sidUsername">{{ updateUserForm.get('sidUsername')?.value }}</p>
      </div>
      <div class="form-group">
        <label for="sidName">SID Name:</label>
        <input type="text" id="sidName" formControlName="sidName">
      </div>
      <div class="form-group">
        <label for="sidDescription">SID Description:</label>
        <textarea input type="text" id="sidDescription" formControlName="sidDescription"></textarea>        
      </div>
      <div class="form-group">
        <label for="sidIsGroup">SID Is Group:</label>
        <select id="sidIsGroup" formControlName="sidIsGroup" class="small-select">
          <option value="" selected>Select an option</option>
           <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div>
        <button type="button" (click)="onCancel()">Cancel</button>
        <button type="submit" [disabled]="!updateUserForm.valid">Update User</button>
      </div>
    </form>
  </div>
</div>
