<!-- HTML -->
<!-- Hide the default file input -->
<input type="file" #fileInput style="display:none;" (change)="onFileSelected($event)">

<!-- Create a custom file upload button -->
<label for="fileInput" class="custom-file-input" (click)="onLabelClick()">Choose File</label>
<!-- Display the selected file name -->
<p id="fileName">{{fileName}}</p>


<div *ngIf="messageItems.length > 0" class="messages-container">
  <span *ngFor="let item of messageItems" class="result-item">
    {{ item.label }}: <span class="result-value">{{ item.value }}</span>
  </span>
</div>
