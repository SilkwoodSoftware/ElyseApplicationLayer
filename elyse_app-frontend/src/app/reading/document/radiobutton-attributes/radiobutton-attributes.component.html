<div class="table-heading">{{ tableHeading }}</div>
<div class="table-container" #tableContainer>
  <table>
    <thead>
      <tr>
        <th *ngFor="let column of columns; let i = index">
          <div class="column-heading" (click)="onColumnSelect(column)"
               [matTooltip]="getTooltip(column)"
               matTooltipPosition="above">
            <span class="column-title">{{ column }}</span>
            <span class="sort-icon" *ngIf="getSortState(tableType.name).column === column">
              {{getSortState(tableType.name).direction === 'asc' ? '\u25b2' : '\u25bc'}}
            </span>
          </div>
          <div class="resize-handle" (mousedown)="onColumnResize($event, i)"></div>
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of tableData"
          [class.selected]="selectedRows.includes(row)"
          (click)="onRowMultiSelect($event, row)">
        <td *ngFor="let column of columns">{{ row[column] }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="messages-container">
  <span *ngFor="let item of messageItems" class="result-item">
    {{ item.label }}: <span class="result-value">{{ item.value }}</span>
  </span>
</div>
