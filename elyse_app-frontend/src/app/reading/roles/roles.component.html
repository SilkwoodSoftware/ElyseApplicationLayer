<div class="dialog-backdrop">
  <div class="dialog-container" #dialogContainer
       (mousedown)="onMouseDown($event)"
       (mousemove)="onMouseMove($event)"
       (mouseup)="onMouseUp()">
    <h2>Select Roles</h2>
    <div>
      <div class="general" *ngIf="roles.length > 0">
        <p>You are authorized for the following roles. <br>
        Select which roles you want to be active for this session.</p>
      </div>
      <div class="general" *ngIf="roles.length === 0">
        <p>You are not authorized for any roles.</p>
      </div>
    </div>

<form (ngSubmit)="onSubmit()">
  <div class="general" *ngFor="let role of roles">
    <input type="checkbox" [value]="role" (change)="onRoleChange(role, $event)" [checked]="isRoleSelected(role)">
    {{ role['Role Name'] }}
  </div>
  <div><br></div>
  <button type="submit" *ngIf="roles.length > 0">Select Roles</button>
  <button type="button" (click)="closeDialog()">Close</button>
  <p class="notes"> </p>
</form>
</div>
</div>
