<div
  *ngIf="visible"
  class="context-menu"
  [style.left.px]="position.x"
  [style.top.px]="position.y">
  
  <div class="context-menu-container">
    <div class="context-menu-items">
      <!-- Render menu items recursively -->
      <ng-container *ngTemplateOutlet="menuItemsTemplate; context: { items: menuItems }"></ng-container>
      
      <!-- Show a message when no items are available -->
      <div *ngIf="menuItems.length === 0" class="context-menu-item disabled">
        <span class="context-menu-item-label">No actions available</span>
      </div>
    </div>
  </div>
</div>

<!-- Template for menu items with recursive rendering for submenus -->
<ng-template #menuItemsTemplate let-items="items">
  <ng-container *ngFor="let item of items">
    <!-- Regular menu item (no children) -->
    <div
      *ngIf="!item.children?.length"
      class="context-menu-item"
      [title]="item.tooltip || ''"
      (click)="onMenuItemClick($event, item)">
      
      <span class="context-menu-item-label">{{ item.label }}</span>
      
      <span
        *ngIf="item.keyboardShortcut"
        class="context-menu-item-shortcut">
        {{ item.keyboardShortcut }}
      </span>
    </div>
    
    <!-- Submenu item (has children) -->
    <div
      *ngIf="item.children?.length"
      class="context-menu-item submenu-item"
      [title]="item.tooltip || ''"
      (click)="toggleSubmenu($event, item)">
      
      <span class="context-menu-item-label">{{ item.label }}</span>
      
      <span class="submenu-arrow">▶</span>
      
      <!-- Submenu container -->
      <div class="submenu" id="submenu-{{item.menuItemId}}">
        <div class="context-menu-items">
          <ng-container *ngTemplateOutlet="menuItemsTemplate; context: { items: item.children }"></ng-container>
        </div>
      </div>
    </div>
  </ng-container>
</ng-template>
