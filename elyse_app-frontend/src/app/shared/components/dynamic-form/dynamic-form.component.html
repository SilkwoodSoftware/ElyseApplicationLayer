<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div *ngFor="let field of fields" class="form-field" [ngClass]="getFieldTypeClass(field)">
    <div class="icon-buttons-container">

      <!-- Add button - disabled for multi-select fields -->
      <button class="icon-buttons" [ngClass]="{'active': isAddButtonActive(field)}"
              [disabled]="!isAddButtonActive(field) || !hasCreateRoute(field) || field.isMultiSelect"
              [matTooltip]="field.isMultiSelect ? 'Multi-select fields use save button' : (hasCreateRoute(field) ? 'Add field' : 'Add field not available for this field type')"
              (click)="onAction(field, 'add')">
              <ng-container *ngIf="hasCreateRoute(field) && !field.isMultiSelect; else blankButton">
                <ng-container *ngTemplateOutlet="addSvg"></ng-container>
              </ng-container>
              <ng-template #blankButton>
                <ng-container *ngTemplateOutlet="blankSvg"></ng-container>
              </ng-template>
      </button>

      <!-- Delete button - disabled for multi-select fields -->
      <button class="icon-buttons" [ngClass]="{'active': isDeleteButtonActive(field)}"
              [disabled]="!isDeleteButtonActive(field) || !hasDeleteRoute(field) || field.isMultiSelect"
              [matTooltip]="field.isMultiSelect ? 'Multi-select fields use save button' : (hasDeleteRoute(field) ? 'Delete field' : 'Delete field not available for this field type')"
              (click)="onAction(field, 'delete')">
              <ng-container *ngIf="hasDeleteRoute(field) && !field.isMultiSelect; else blankButton">
                <ng-container *ngTemplateOutlet="deleteSvg"></ng-container>
              </ng-container>
              <ng-template #blankButton>
                <ng-container *ngTemplateOutlet="blankSvg"></ng-container>
              </ng-template>
      </button>

      <!-- Multi-select save button -->
      <button *ngIf="field.isMultiSelect" class="icon-buttons" [ngClass]="{'active': isSaveButtonActive(field)}"
              [disabled]="!isSaveButtonActive(field)"
              [matTooltip]="isSaveButtonActive(field) ? 'Save multi-select changes' : 'No changes to save'"
              (click)="onMultiSelectSave(field)">
        <ng-container *ngTemplateOutlet="saveSvg"></ng-container>
      </button>

      <!-- Regular save button for non-multi-select fields -->
      <button *ngIf="!field.isMultiSelect" class="icon-buttons" [ngClass]="{'active': isSaveButtonActive(field)}"
              [matTooltip]="hasUpdateRoute(field) ? 'Update field' : 'Update field not available for this field type'"
              (click)="onAction(field, 'update')">
        <ng-container *ngIf="hasUpdateRoute(field); else blankButton">
          <ng-container *ngTemplateOutlet="saveSvg"></ng-container>
        </ng-container>
        <ng-template #blankButton>
          <ng-container *ngTemplateOutlet="blankSvg"></ng-container>
        </ng-template>
      </button>

      <button class="icon-buttons" [ngClass]="{'active': isRevertButtonActive(field)}" 
              [disabled]="!isRevertButtonActive(field)"
              [matTooltip]="'Revert value'" (click)="onAction(field, 'revert')">        
        <ng-container *ngTemplateOutlet="revertSvg"></ng-container>
      </button>
      
    </div>
    <label [for]="field.name">{{ field.displayName || field.name }}</label>
    <ng-container *ngIf="form.get(field.name)">
    <ng-container [ngSwitch]="getInputType(field)">
      <div *ngSwitchCase="'multi-select'" class="multi-select-container">
        <!-- Selected items as tags -->
        <div class="selected-tags" *ngIf="field.selectedItems && field.selectedItems.length > 0">
          <span *ngFor="let item of field.selectedItems" class="selected-tag">
            {{ item.name }}
            <button type="button" class="tag-remove" (click)="onMultiSelectRemove(field, item.id)">&times;</button>
          </span>
        </div>
        
        <!-- Add item dropdown -->
        <select class="add-item-dropdown" [style]="getInputStyle(field)"
                (change)="onMultiSelectDropdownChange(field, $event)"
                style="font-size: 10px;">
          <option value="">-- Add Item --</option>
          <option *ngFor="let option of getAvailableMultiSelectOptions(field)" [value]="option.Id"
                  style="font-size: 10px;">
            {{ option.Name }}
          </option>
        </select>
      </div>
      
      <select *ngSwitchCase="'dropdown'" [id]="field.name" [formControlName]="field.name"
              [style]="getInputStyle(field)" [tabindex]="field.tabIndex"
              style="font-size: 10px;">
        <option value="" disabled selected>-- Select --</option>
        <option *ngFor="let option of field.dropdownOptions" [value]="option.Id"
        style="font-size: 10px;">
          {{ option.Name }}
        </option>
        <option *ngIf="!field.dropdownOptions || field.dropdownOptions.length === 0" value="" disabled style="font-size: 10px;">No options available</option>
      </select>
      <input *ngSwitchCase="'number'" [id]="field.name" [formControlName]="field.name"
             type="number" [style]="getInputStyle(field)" [tabindex]="field.tabIndex">

      <!-- Date picker case - database format display -->
      <div *ngSwitchCase="'date'" style="display: inline-flex; align-items: center;">
        <span [style]="getInputStyle(field)"
              style="padding: 3px 8px; border: 1px solid #9f9f9f; border-radius: 4px; font-size: 0.6rem; font-family: Arial, sans-serif; background: white; display: inline-block; cursor: pointer;"
              (click)="picker.open()">
          {{ getFormattedDateDisplay(field) || getDatePlaceholder(field) }}
        </span>
        <input [id]="field.name"
               [formControlName]="field.name"
               [matDatepicker]="picker"
               [tabindex]="field.tabIndex"
               type="hidden">
        <mat-datepicker-toggle matSuffix [for]="picker"
                               style="margin-left: 4px;">
        </mat-datepicker-toggle>
        <mat-datepicker #picker startView="month" (closed)="onDateChange(field, $event)"></mat-datepicker>
      </div>
             
      <textarea *ngSwitchCase="'textarea'" [id]="field.name" [formControlName]="field.name"
                [style]="getInputStyle(field)" [tabindex]="field.tabIndex"
                [maxlength]="field.characterLimit && field.characterLimit > 0 ? field.characterLimit : null"></textarea>
      <input *ngSwitchCase="'readonly'" [id]="field.name" [formControlName]="field.name"
             type="text" [style]="getInputStyle(field)" [tabindex]="field.tabIndex"
             readonly>
      <input *ngSwitchDefault [id]="field.name" [formControlName]="field.name"
             type="text" [style]="getInputStyle(field)" [tabindex]="field.tabIndex"
             [maxlength]="field.characterLimit && field.characterLimit > 0 ? field.characterLimit : null">
    </ng-container>
  </ng-container>
  <ng-container *ngIf="field.error">
    <span class="error-message">{{ field.error }}</span>
  </ng-container>
  <ng-container *ngIf="form.get(field.name)?.errors?.['maxlength']">
    <span class="error-message">Maximum {{ field.characterLimit }} characters allowed</span>
  </ng-container>
    <ng-container *ngIf="field.units">
      <label class="field-info">{{ field.units }}</label>
    </ng-container>
    <ng-container *ngIf="field.dateFormat">
      <label class="field-info date-format">{{ field.dateFormat }}</label>
    </ng-container>
    <ng-container *ngIf="field.characterLimit && field.characterLimit > 0 && !field.isDropdown">
      <label class="field-info character-limit">&nbsp;&nbsp;Max: {{ field.characterLimit }} characters</label>
    </ng-container>
  </div>
</form>

<!-- SVG icon template files-->
<!-- BLANK -->
<ng-template #blankSvg>
  <svg class="icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
      <path d="M 1 1 l 0 24 l 24 0 l 0 -24 l -24 0 Z" 
      stroke-width= "0.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="grey"/>
  </svg>
</ng-template>

 <!-- SAVE -->
<ng-template #saveSvg>
  <svg class="icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
      <path d="M 3 2 l 0 19 l 17 0 l 0 -15 l -4 -4 l -13 0 Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="12" cy="12" r="3" stroke-width="1.2" fill="none"/>
  </svg>
</ng-template>

<!-- REVERT -->
<ng-template #revertSvg>
  <svg class="icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
    stroke-linejoin="round">
    <path d="M 0 19 l 16 0 a 7 7 0 0 0 0 -14 l -10 0 m 4 -4 l -4 4 l 4 4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
   </svg>
</ng-template>

<!-- DELETE -->
<ng-template #deleteSvg>
  <svg class="icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="11" fill="none" stroke-width="2"/>
    <line x1="7" y1="12" x2="17" y2="12" stroke-width="2"/>
  </svg>
</ng-template>

<!-- ADD -->
<ng-template #addSvg>
  <svg class="icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="11" fill="none" stroke="black" stroke-width="2"/>
    <line x1="12" y1="6" x2="12" y2="18" stroke="black" stroke-width="2"/>
    <line x1="6" y1="12" x2="18" y2="12" stroke="black" stroke-width="2"/>
  </svg>
</ng-template>

<!-- End of SVG icon templates-->
