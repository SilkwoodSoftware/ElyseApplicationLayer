<div class="dialog-backdrop">
  <div class="dialog-container auto-width scrollable" #dialogContainer
       (mousedown)="onMouseDown($event)"
       (mousemove)="onMouseMove($event)"
       (mouseup)="onMouseUp()">
    <div class="message-heading">{{ data.title }}</div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Action</th>
            <th>Role</th>
            <th>{{ getLabel('transactionMessage') }}</th>
            <th>{{ getLabel('transactionStatus') }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let result of data.transactionResults" [class.error]="!result.transactionStatus.includes('Good')">
            <td>{{ result.action }}</td>
            <td>{{ result.role }}</td>
            <td>{{ result.transactionMessage }}</td>
            <td>{{ result.transactionStatus }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="message-text">
      <button class="confirmation-buttons" color="primary" (click)="closeDialog()">OK</button>
    </div>
  </div>
</div>
