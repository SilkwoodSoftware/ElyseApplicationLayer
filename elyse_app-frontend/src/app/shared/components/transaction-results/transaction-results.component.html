<div class="dialog-backdrop">
  <!-- Use a static dialog that doesn't have dragging functionality -->
  <div class="results-dialog static-dialog" #dialogContainer>
    <h2>{{ data.title }}</h2>
    <div *ngIf="data.showDocumentId && data.documentId" class="document-id">
      Document ID: {{ data.documentId }}
    </div>
    <div class="table-container">
      <table class="resizable-table">
        <thead>
          <tr>
            <th>{{ data.idColumnName || 'File ID' }}</th>
            <th *ngIf="data.showFileName">File Name</th>
            <th class="message-column">Message</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let result of data.results"
              [class.error]="result.transactionStatus !== 'Good'">
            <td>{{ result.id }}</td>
            <td *ngIf="data.showFileName">{{ result.fileName }}</td>
            <td class="message-cell">
              {{ result.transactionMessage }}
            </td>
            <td>
              {{ result.transactionStatus }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="message-text">
      <button class="confirmation-buttons" (click)="closeDialog()">Close</button>
    </div>
  </div>
</div>
